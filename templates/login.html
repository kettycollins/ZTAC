<!DOCTYPE html>
<html lang="uk" data-theme="auto">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід до системи | Zero Trust Access</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="zt-wrap">
        <div class="zt-header">
            <span class="zt-badge">pdp-v2.5</span>
            <span class="zt-logo">Zero Trust Access Control</span>
            <div class="zt-divider"></div>
            <button id="theme-toggle" class="theme-btn" type="button" title="Змінити тему">🌓</button>
        </div>

        <div class="zt-card">
            <h2 style="margin-top: 0; margin-bottom: 20px; font-weight: 400; font-size: 20px;">Автентифікація контексту
            </h2>

            {% if error %}
            <div class="error-box" style="margin-bottom: 15px; padding: 10px; font-size: 14px;">
                {{ error }}
            </div>
            {% endif %}

            <form action="{{ url_for('login') }}" method="POST">
                <div class="zt-grid">
                    <div class="zt-field">
                        <label class="zt-label">Username</label>
                        <input type="text" name="username" class="zt-input" placeholder="Наприклад, admin1" required>
                    </div>

                    <div class="zt-field">
                        <label class="zt-label">Password</label>
                        <input type="password" name="password" class="zt-input" placeholder="••••••••" required>
                    </div>

                    <div class="zt-field">
                        <label class="zt-label">Device Trust</label>
                        <select name="device" class="zt-select">
                            <option value="managed" selected>Managed Device (Керований)</option>
                            <option value="unmanaged">BYOD Device (Власний пристрій)</option>
                        </select>
                    </div>

                    <div class="zt-field">
                        <label class="zt-label">Network Trust</label>
                        <select name="network" class="zt-select">
                            <option value="school" selected>School Network (Внутрішня ліцею)</option>
                            <option value="home">Home Network (Домашня/VPN)</option>
                            <option value="public">Public Network (Публічна Wi-Fi)</option>
                        </select>
                    </div>
                </div>

                <div class="zt-context-bar">
                    <span class="zt-dot"></span>
                    <span>policy-engine · v2.5 · context-verification · identity-provider</span>
                </div>

                <button type="submit" class="zt-btn">Надіслати запит (Request Access)</button>
            </form>
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const htmlEl = document.documentElement;

        const savedTheme = localStorage.getItem('theme') || 'auto';
        htmlEl.setAttribute('data-theme', savedTheme);

        toggleBtn.addEventListener('click', () => {
            const currentTheme = htmlEl.getAttribute('data-theme');
            let newTheme = 'light';

            if (currentTheme === 'light') {
                newTheme = 'dark';
            } else if (currentTheme === 'dark') {
                newTheme = 'light';
            } else {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                newTheme = prefersDark ? 'light' : 'dark';
            }

            htmlEl.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
</body>

</html>
