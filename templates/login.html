<!DOCTYPE html>
<html lang="{{ lang }}" data-theme="auto">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t.login_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .lang-btn {
            background: transparent;
            border: 1px solid var(--border-primary);
            color: var(--text-main);
            padding: 4px 10px;
            border-radius: 4px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .lang-btn:hover {
            background: var(--bg-card);
            border-color: var(--border-secondary);
        }

        /* --- СТИЛІЗАЦІЯ ІНТЕРАКТИВНОГО TOGGLE BUTTON ДЛЯ VPN --- */
        .vpn-toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-main);
            border: 1px solid var(--border-primary);
            border-radius: 6px;
            padding: 12px 16px;
            height: 54px;
            transition: all 0.2s;
        }

        .vpn-toggle-container.active {
            border-color: var(--color-allow);
        }

        /* Стилі для стану, коли VPN недоступний (disabled) */
        .vpn-toggle-container.disabled {
            opacity: 0.5;
            background: var(--bg-card);
            border-color: var(--border-primary);
            cursor: not-allowed;
        }

        .vpn-toggle-container.disabled .switch,
        .vpn-toggle-container.disabled input {
            cursor: not-allowed;
            pointer-events: none;
        }

        .vpn-left-side {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .vpn-icon-box {
            font-size: 20px;
            line-height: 1;
            display: inline-flex;
            transition: transform 0.2s;
        }

        .vpn-toggle-container.active .vpn-icon-box {
            transform: scale(1.1);
        }

        .vpn-info-block {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .vpn-status-label {
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
        }

        .vpn-tech-comment {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .vpn-toggle-container.active .vpn-tech-comment {
            color: var(--color-allow);
        }

        /* Конструкція повзунка */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
            flex-shrink: 0;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--border-primary);
            transition: .2s;
            border-radius: 22px;
            border: 1px solid var(--border-secondary);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: var(--text-main);
            transition: .2s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--color-allow);
            border-color: var(--color-allow);
        }

        input:checked+.slider:before {
            transform: translateX(22px);
            background-color: #ffffff;
        }
    </style>
</head>

<body>
    <div class="zt-wrap">
        <div class="zt-header" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <div style="display: flex; align-items: center; gap: 10px; flex-grow: 1;">
                <span class="zt-badge">pdp-v3.5</span>
                <span class="zt-logo">Zero Trust Access Control</span>
                <div class="zt-divider" style="flex-grow: 1;"></div>
            </div>

            <div style="display: flex; align-items: center; gap: 10px; margin-left: 15px;">
                {% if lang == 'uk' %}
                <a href="{{ url_for('set_language', lang_code='en') }}" class="lang-btn">🇬🇧 EN</a>
                {% else %}
                <a href="{{ url_for('set_language', lang_code='uk') }}" class="lang-btn">🇺🇦 UA</a>
                {% endif %}
                <button id="theme-toggle" class="theme-btn" type="button" title="Змінити тему">🌓</button>
            </div>
        </div>

        <div class="zt-card">
            <h2 style="margin-top: 0; margin-bottom: 20px; font-weight: 400; font-size: 20px;">{{ t.login_header }}</h2>

            {% if error %}
            <div class="error-box" style="margin-bottom: 15px; padding: 10px; font-size: 14px;">
                {{ error }}
            </div>
            {% endif %}

            <form action="{{ url_for('login') }}" method="POST">
                <div class="zt-grid">
                    <div class="zt-field">
                        <label class="zt-label">{{ t.lbl_username }}</label>
                        <input type="text" name="username" class="zt-input" placeholder="e.g. admin1, teacher1..."
                            required>
                    </div>

                    <div class="zt-field">
                        <label class="zt-label">{{ t.lbl_password }}</label>
                        <input type="password" name="password" class="zt-input" placeholder="••••••••" required>
                    </div>

                    <div class="zt-field">
                        <label class="zt-label">{{ t.lbl_device }}</label>
                        <select name="device" id="device-select" class="zt-select">
                            <option value="managed">{{ t.opt_managed }}</option>
                            <option value="unmanaged">{{ t.opt_unmanaged }}</option>
                        </select>
                    </div>

                    <div class="zt-field">
                        <label class="zt-label">{{ t.lbl_network }}</label>
                        <select name="network" id="network-select" class="zt-select">
                            <option value="school">{{ t.opt_net_school }}</option>
                            <option value="home">{{ t.opt_net_home }}</option>
                            <option value="public">{{ t.opt_net_public }}</option>
                        </select>
                    </div>

                    <div class="zt-field" style="grid-column: span 2;">
                        <label class="zt-label">{{ t.lbl_vpn }}</label>
                        <div id="vpn-container" class="vpn-toggle-container">
                            <div class="vpn-left-side">
                                <div id="vpn-icon" class="vpn-icon-box">🔓</div>
                                <div class="vpn-info-block">
                                    <div id="vpn-status-text" class="vpn-status-label">
                                        {{ t.opt_vpn_no }}
                                    </div>
                                    <div id="vpn-comment" class="vpn-tech-comment">
                                        disabled · traffic unencrypted
                                    </div>
                                </div>
                            </div>

                            <label class="switch">
                                <input type="checkbox" id="vpn-checkbox">
                                <span class="slider"></span>
                            </label>
                        </div>

                        <input type="hidden" name="vpn" id="vpn-hidden-input" value="no">
                    </div>
                </div>

                <div class="zt-context-bar">
                    <span class="zt-dot"></span>
                    <span>policy-engine · v3.5 · context-verification · identity-provider</span>
                </div>

                <button type="submit" class="zt-btn">{{ t.btn_submit_login }}</button>
            </form>
        </div>
    </div>

    <script>
        // Тема оформлення
        const toggleBtn = document.getElementById('theme-toggle');
        const htmlEl = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'auto';
        htmlEl.setAttribute('data-theme', savedTheme);

        toggleBtn.addEventListener('click', () => {
            const currentTheme = htmlEl.getAttribute('data-theme');
            let newTheme = 'light';
            if (currentTheme === 'light') newTheme = 'dark';
            else if (currentTheme === 'dark') newTheme = 'light';
            else {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                newTheme = prefersDark ? 'light' : 'dark';
            }
            htmlEl.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // Інтерактивний VPN тоґлер з бізнес-логікою
        const deviceSelect = document.getElementById('device-select');
        const networkSelect = document.getElementById('network-select');
        const vpnCheckbox = document.getElementById('vpn-checkbox');
        const vpnHiddenInput = document.getElementById('vpn-hidden-input');
        const vpnStatusText = document.getElementById('vpn-status-text');
        const vpnContainer = document.getElementById('vpn-container');
        const vpnIcon = document.getElementById('vpn-icon');
        const vpnComment = document.getElementById('vpn-comment');

        const txtVpnYes = "{{ t.opt_vpn_yes }}";
        const txtVpnNo = "{{ t.opt_vpn_no }}";
        const commentOn = "{{ t.vpn_comment_on }}";
        const commentOff = "{{ t.vpn_comment_off }}";

        // Функція перевірки контексту для активації/деактивації тоґлера
        function updateVpnState() {
            const currentDevice = deviceSelect.value;
            const currentNetwork = networkSelect.value;
            const currentUsername = document.querySelector('input[name="username"]').value.toLowerCase().trim();

            
            // БІЗНЕС-ПРАВИЛО: VPN доступний ТІЛЬКИ для managed девайсів, НЕ в school мережі і НЕ для guest/student користувачів
            const isGuest = currentUsername.includes('guest') || currentUsername === '';
            const isStudent = currentUsername.includes('student') || currentUsername.includes('stud');
            const isVpnAllowed = (currentDevice === 'managed' && currentNetwork !== 'school' && !isGuest && !isStudent);

            if (!isVpnAllowed) {
                // Примусово вимикаємо та блокуємо тоглер
                vpnCheckbox.checked = false;
                vpnCheckbox.disabled = true;
                vpnHiddenInput.value = 'no';
                vpnStatusText.textContent = txtVpnNo;
                vpnIcon.textContent = '🔓';
                vpnComment.textContent = commentOff;
                vpnContainer.classList.remove('active');
                vpnContainer.classList.add('disabled'); // Робимо блок напівпрозорим
            } else {
                // Розблоковуємо тоглер для використання
                vpnCheckbox.disabled = false;
                vpnContainer.classList.remove('disabled');
            }
        }
        
        // Обробник ручного кліку по самому тоґлеру
        vpnCheckbox.addEventListener('change', function () {
            if (this.checked) {
                vpnHiddenInput.value = 'yes';
                vpnStatusText.textContent = txtVpnYes;
                vpnIcon.textContent = '🔒';
                vpnComment.textContent = commentOn;
                vpnContainer.classList.add('active');
            } else {
                vpnHiddenInput.value = 'no';
                vpnStatusText.textContent = txtVpnNo;
                vpnIcon.textContent = '🔓';
                vpnComment.textContent = commentOff;
                vpnContainer.classList.remove('active');
            }
        });

        // Слідкуємо за змінами у полях пристрою та мережі
        deviceSelect.addEventListener('change', updateVpnState);
        networkSelect.addEventListener('change', updateVpnState);

        // Ініціалізація стану при завантаженні сторінки
        updateVpnState();
    </script>
</body>

</html>
